<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>{{ seo_title | default('Architektura Heleny') }}</title>
    <meta name="description" content="{{ seo_description | default('Architektura Heleny - portfolio projektów') }}" />
    {% if canonical_url %}
    <link rel="canonical" href="{{ canonical_url }}" />
    {% endif %}
    <meta property="og:locale" content="pl_PL" />
    <meta property="og:site_name" content="Architektura Heleny" />
    <meta property="og:type" content="{{ og_type | default('website') }}" />
    <meta property="og:title" content="{{ seo_title | default('Architektura Heleny') }}" />
    <meta property="og:description"
        content="{{ seo_description | default('Architektura Heleny - portfolio projektów') }}" />
    {% if canonical_url %}
    <meta property="og:url" content="{{ canonical_url }}" />
    {% endif %}
    {% if og_image_url %}
    <meta property="og:image" content="{{ og_image_url }}" />
    {% endif %}
    <meta name="twitter:card" content="{{ twitter_card | default('summary') }}" />
    <meta name="twitter:title" content="{{ seo_title | default('Architektura Heleny') }}" />
    <meta name="twitter:description"
        content="{{ seo_description | default('Architektura Heleny - portfolio projektów') }}" />
    {% if og_image_url %}
    <meta name="twitter:image" content="{{ og_image_url }}" />
    {% endif %}
    {% if robots_meta %}
    <meta name="robots" content="{{ robots_meta }}" />
    {% endif %}
    <link rel="icon" href="/architektura-heleny-favicon.svg?v=2" type="image/svg+xml" sizes="any" />
    <link rel="alternate icon" href="/architektura-heleny-favicon-32x32.png?v=2" sizes="32x32" type="image/png" />
    <style>
        /*INLINE_GLOBAL_CSS*/
    </style>
    <!-- Privacy-friendly analytics by Plausible -->
    <script async src="https://analytics.rafsaf.pl/js/pa-IkxV-1VZt2Duju7wqECpL.js"></script>
    <script>
        window.plausible = window.plausible || function () { (plausible.q = plausible.q || []).push(arguments) }, plausible.init = plausible.init || function (i) { plausible.o = i || {} };
        plausible.init()
    </script>
</head>

<body>
    {% include 'components/navbar.html' %}
    <main class="main-content">
        {% block content %}
        {% endblock %}
    </main>
    {% include 'components/footer.html' %}
</body>

</html>
